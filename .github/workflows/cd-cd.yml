name: ClinicPlus CI/CD — Lint & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  lint:
    name: 🔍 Lint HTML & CSS
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Récupération du code
        uses: actions/checkout@v4

      - name: ⚙️ Installation Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Installation des dépendances
        run: npm ci

      - name: ✅ Lint HTML
        run: npm run lint:html

      - name: ✅ Lint CSS
        run: npm run lint:css

  deploy:
    name: 🚀 Déploiement GitHub Pages
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 📥 Récupération du code
        uses: actions/checkout@v4

      - name: ⚙️ Configuration GitHub Pages
        uses: actions/configure-pages@v4

      - name: 📤 Upload des fichiers statiques
        uses: actions/upload-pages-artifact@v3
        with:
          path: './src'

      - name: 🌐 Déploiement
        id: deployment
        uses: actions/deploy-pages@v4
